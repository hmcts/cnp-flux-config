---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  chart:
    spec:
      chart: neuvector-azure-keyvault
      version: 1.6.7
  values:
    rules:
      response:
        policies:
          - name: admission-control-denied
            event: admission-control
            conditions:
              - type: name
                value: Admission.Control.Denied
            actions:
              - webhook
            disable: false
          - name: security-event-all
            event: security-event
            conditions: []
            actions:
              - webhook
            disable: true
          - name: security-event-error
            event: security-event
            conditions:
              - type: level
                value: Error
            actions:
              - webhook
            disable: false
          - name: security-event-privilege-escalation
            event: security-event
            conditions:
              - type: name
                value: Container.Privilege.Escalation
            actions:
              - quarantine
            disable: true
          - name: cve-report-high
            event: cve-report
            conditions:
              - type: cve-high
                value: "10"
            actions:
              - quarantine
            disable: true
          - name: event-container-quarantined
            event: event
            conditions:
              - type: name
                value: Container.Quarantined
            actions:
              - webhook
            disable: false
          - name: compliance-5-4
            event: compliance
            conditions:
              - type: name
                value: "5.4"
            actions:
              - webhook
            disable: true
    neuvector:
      controller:
        tolerations:
          - key: "CriticalAddonsOnly"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - neuvector-controller-pod
                  topologyKey: "kubernetes.io/hostname"
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - konnectivity-agent
                topologyKey: "kubernetes.io/hostname"
                namespaces: ["kube-system"]
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 1
                preference:
                  matchExpressions:
                    - key: kubernetes.azure.com/mode
                      operator: In
                      values:
                        - system
      manager:
        tolerations:
          - key: "CriticalAddonsOnly"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - neuvector-manager-pod
                  topologyKey: "kubernetes.io/hostname"
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - konnectivity-agent
                topologyKey: "kubernetes.io/hostname"
                namespaces: ["kube-system"]
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 1
                preference:
                  matchExpressions:
                    - key: kubernetes.azure.com/mode
                      operator: In
                      values:
                        - system
      cve:
        scanner:
          tolerations:
            - key: "CriticalAddonsOnly"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app
                          operator: In
                          values:
                            - neuvector-scanner-pod
                    topologyKey: "kubernetes.io/hostname"
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - konnectivity-agent
                  topologyKey: "kubernetes.io/hostname"
                  namespaces: ["kube-system"]
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 1
                  preference:
                    matchExpressions:
                      - key: kubernetes.azure.com/mode
                        operator: In
                        values:
                          - system
    keyvault:
      name: cftapps-test
      resourcegroup: core-infra-test-rg
      subscriptionid: 8a07fdcd-6abd-48b3-ad88-ff737a4b9e3c
      tenantid: 531ff96d-0ae9-462a-8d2d-bec7c0b42082
      licensesecretname: neuvector-license-dev
    keyVaults:
      cftapps-test:
        excludeEnvironmentSuffix: true
        secrets:
          - neuvector-admin-password
          - neuvector-license-dev
          - neuvector-slack-webhook
          - neuvector-new-admin-password