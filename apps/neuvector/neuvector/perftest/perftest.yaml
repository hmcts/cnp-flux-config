---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  values:
    groups:
      customGroups:
        - name: crime-idam-postgres
          criteria:
            - key: address
              op: =
              value: 10.48.105.0/24
    rules:
      network:
        customRules:
          - name: crime-idam
            egress:
              - action: allow
                applications:
                  - PostgreSQL
                  - SSL
                name: idam-postgres
                ports: tcp/5432
                priority: 0
                selector:
                  criteria: []
                  name: crime-idam-postgres
              - action: deny
                applications: []
                name: idam-deny-external
                ports: any
                priority: 0
                selector:
                  criteria: []
                  name: external
              - action: deny
                applications: []
                name: idam-deny-internal
                ports: any
                priority: 0
                selector:
                  criteria: []
                  name: allnamespaces
            target:
              policymode: N/A  # NeuVector CRD controller rejects Protect/Monitor for groups with no active workloads; set mode via portal once crime-idam workloads are running
              selector:
                criteria: []
                name: crime-idam-namespace
    neuvector:
      controller:
        tolerations:
          - key: "CriticalAddonsOnly"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - neuvector-controller-pod
                  topologyKey: "kubernetes.io/hostname"
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - konnectivity-agent
                topologyKey: "kubernetes.io/hostname"
                namespaces: ["kube-system"]
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 1
                preference:
                  matchExpressions:
                    - key: kubernetes.azure.com/mode
                      operator: In
                      values:
                        - system
      manager:
        tolerations:
          - key: "CriticalAddonsOnly"
            operator: "Equal"
            value: "true"
            effect: "NoSchedule"
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - neuvector-manager-pod
                  topologyKey: "kubernetes.io/hostname"
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - konnectivity-agent
                topologyKey: "kubernetes.io/hostname"
                namespaces: ["kube-system"]
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 1
                preference:
                  matchExpressions:
                    - key: kubernetes.azure.com/mode
                      operator: In
                      values:
                        - system
      cve:
        scanner:
          tolerations:
            - key: "CriticalAddonsOnly"
              operator: "Equal"
              value: "true"
              effect: "NoSchedule"
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchExpressions:
                        - key: app
                          operator: In
                          values:
                            - neuvector-scanner-pod
                    topologyKey: "kubernetes.io/hostname"
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - konnectivity-agent
                  topologyKey: "kubernetes.io/hostname"
                  namespaces: ["kube-system"]
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 1
                  preference:
                    matchExpressions:
                      - key: kubernetes.azure.com/mode
                        operator: In
                        values:
                          - system
    keyvault:
      name: cftapps-test
      resourcegroup: core-infra-test-rg
      subscriptionid: 8a07fdcd-6abd-48b3-ad88-ff737a4b9e3c
      tenantid: 531ff96d-0ae9-462a-8d2d-bec7c0b42082
      licensesecretname: neuvector-license-dev
    keyVaults:
      cftapps-test:
        excludeEnvironmentSuffix: true
        secrets:
          - neuvector-admin-password
          - neuvector-license-dev
          - neuvector-slack-webhook
          - neuvector-new-admin-password
