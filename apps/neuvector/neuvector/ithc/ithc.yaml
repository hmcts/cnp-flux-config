---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  values:
    groups:
      customGroups:
        - name: crime-idam-postgres
          criteria:
            - key: address
              op: =
              value: 10.0.1.0/24  # TODO: replace with IDAM postgres subnet CIDR
            - key: address
              op: =
              value: 10.0.2.0/24  # TODO: replace with IDAM postgres subnet CIDR
    rules:
      network:
        customRules:
          - name: crime-idam
            egress:
              - action: allow
                applications:
                  - PostgreSQL
                  - SSL
                name: idam-postgres
                ports: tcp/5432
                priority: 0
                selector:
                  criteria: []
                  name: crime-idam-postgres
              - action: deny
                applications: []
                name: idam-deny-external
                ports: any
                priority: 0
                selector:
                  criteria: []
                  name: external
              - action: deny
                applications: []
                name: idam-deny-internal
                ports: any
                priority: 0
                selector:
                  criteria: []
                  name: allnamespaces
            target:
              policymode: N/A  # NeuVector CRD controller rejects Protect/Monitor for groups with no active workloads; set mode via portal once crime-idam workloads are running
              selector:
                criteria: []
                name: crime-idam-namespace
    keyvault:
      name: cftapps
      resourcegroup: core-infra-ithc-rg
      subscriptionid: 62864d44-5da9-4ae9-89e7-0cf33942fa09
      tenantid: 531ff96d-0ae9-462a-8d2d-bec7c0b42082
      licensesecretname: neuvector-license-dev
    keyVaults:
      cftapps:
        secrets:
          - neuvector-admin-password
          - neuvector-license-dev
          - neuvector-slack-webhook
          - neuvector-new-admin-password
