---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  chart:
    spec:
      chart: neuvector-azure-keyvault
      version: 1.6.12
  values:
    neuvector:
      controller:
        azureFileShare:
          # shareName: neuvector-data-01
          shareName: neuvector-data-01-refresh
        ingress:
          host: cft-neuvector01-api.ithc.platform.hmcts.net
        configmap:
          data:
            samlinitcfg.yaml: |
              SSO_URL: https://login.microsoftonline.com/531ff96d-0ae9-462a-8d2d-bec7c0b42082/saml2
              Issuer: https://sts.windows.net/531ff96d-0ae9-462a-8d2d-bec7c0b42082/
              X509_Cert: |
                -----BEGIN CERTIFICATE-----
                MIICxDCCAaygAwIBAgIIecokNzuRzO4wDQYJKoZIhvcNAQELBQAwIjEgMB4GA1UEAwwXQ0ZUIE5l
                dXZlY3RvciAtIElUSEMgMDEwHhcNMjYwNDIyMDg0OTE5WhcNMjcwNDIyMDg1OTE5WjAiMSAwHgYD
                VQQDDBdDRlQgTmV1dmVjdG9yIC0gSVRIQyAwMTCCASIwDQYJKoZIhvcNAQEBBQADggEPADCCAQoC
                ggEBANphfUNsE5zVDrz2vQj8qRPQLbw/MZziDdzGjN7owHA/AyqGC3bctX7M8oTZzuHTwnnY9Q2K
                W+zSn81fsUN5+f2ssigSXvgnYqfWMYifLRvqVO27ePkwNJbLTo1x0ooK6Za6wd5CCbB4S7nc7bjf
                lr6UuIaYg63mjrPWmrVXNVnrbLM5h2tFESWvXYyZoOiSa1Q0cpvK2Y4dxbQVgDgDLpLj6ubpipxh
                VsmKFcl0xjlhFHofmhookxN1jrat7alkIDSrAtAgJCvttHt5jmx0fCerhjrFdcECezBZ3dXxMiZx
                HTQVeVmhL6eAwGsuh6Use0TmpWkbWHSW8Avzlf4zeGcCAwEAATANBgkqhkiG9w0BAQsFAAOCAQEA
                k3U7WvKRJEjmUO7zanmmePft0KxA3/+HGQdlMBCAQzK/3jO8wQCGhnnVHIgIb+Tbcy7FF2k7ewb3
                h3wEuXcD3Wp7kfzI1O0ttU2kgnfPVZy3AXHNGpechQEY8Ljimg1rpZ39Bwr2SjvPyqzVjb05Tdh2
                3Kxl/ssEHJKWew2oYiRQmCqyw8aEV5MkqwWb1DakbH4209eJ895gQdND6cqF5dGx7g6zxSHhknp/
                xH0S11F4n64TKSVQRhNCzQTRp4wNHlfltTi/cDfBHW/kWCa19oNarLAnb5pQirrHf1GbcDn5yMqJ
                9Ey0JBw2HtdKCczxeZR6KpXoTEH0tRv8L98CXA==
                -----END CERTIFICATE-----
              Enable: true
              Default_Role: reader
              Role_Groups:
                admin:
                  - e7ea2042-4ced-45dd-8ae3-e051c6551789
      manager:
        ingress:
          host: cft-neuvector-ithc01.hmcts.net
    groups:
      - name: cp-idam
        criteria:
          - key: namespace
            op: =
            value: crime-idam
      - name: cp-idam-postgres
        criteria:
          - key: address
            op: =
            value: 10.0.1.0/24  # TODO: replace with IDAM postgres subnet CIDR
          - key: address
            op: =
            value: 10.0.2.0/24  # TODO: replace with IDAM postgres subnet CIDR
    rules:
      admission:
        enable: true
      response:
        defaultPolicies:
          - name: admission-control-denied
            event: admission-control
            conditions:
              - type: name
                value: Admission.Control.Denied
            actions:
              - webhook
            disable: false
          - name: security-event-all
            event: security-event
            conditions: []
            actions:
              - webhook
            disable: true
          - name: security-event-error
            event: security-event
            conditions:
              - type: level
                value: Error
            actions:
              - webhook
            disable: true
          - name: security-event-privilege-escalation
            event: security-event
            conditions:
              - type: name
                value: Container.Privilege.Escalation
            actions:
              - quarantine
            disable: true
          - name: cve-report-high
            event: cve-report
            conditions:
              - type: cve-high
                value: "10"
            actions:
              - quarantine
            disable: true
          - name: event-container-quarantined
            event: event
            conditions:
              - type: name
                value: Container.Quarantined
            actions:
              - webhook
            disable: false
          - name: compliance-5-4
            event: compliance
            conditions:
              - type: name
                value: "5.4"
            actions:
              - webhook
            disable: true
      network:
        defaultRules:
          - name: allpods
            egress:
              - action: allow
                applications:
                  - DNS
                name: DNS
                ports: udp/53
                priority: 0
                selector:
                  criteria:
                    - key: domain
                      op: =
                      value: kube-system
                  name: nv.kube-dns.kube-system
              - action: allow
                applications:
                  - HTTP
                  - SSL
                name: ApplicationInsights
                ports: tcp/443
                priority: 0
                selector:
                  criteria:
                    - key: address
                      op: =
                      value: dc.services.visualstudio.com
                    - key: address
                      op: =
                      value: rt.services.visualstudio.com
                    - key: address
                      op: =
                      value: dc.applicationinsights.microsoft.com
                    - key: address
                      op: =
                      value: euw.rt.prod.applicationinsights.trafficmanager.net
                  name: ApplicationInsights
              - action: allow
                applications:
                  - HTTP
                  - PostgreSQL
                  - SSL
                name: AzurePostgreSQL
                ports: tcp/5432
                priority: 0
                selector:
                  criteria:
                    - key: address
                      op: =
                      value: '*.postgres.database.azure.com'
                  name: AzurePostgreSQL
              - action: allow
                applications:
                  - SSL
                name: ServiceBus
                ports: tcp/5671
                priority: 0
                selector:
                  criteria:
                    - key: address
                      op: =
                      value: '*.servicebus.windows.net'
                  name: ServiceBus
              - action: allow
                applications:
                  - HTTP
                  - SSL
                name: GovUkNotify
                ports: tcp/443
                priority: 0
                selector:
                  criteria:
                    - key: address
                      op: =
                      value: api.notifications.service.gov.uk
                  name: GovUkNotify
              - action: allow
                applications:
                  - HTTP
                  - SSL
                name: GovUkPay
                ports: tcp/443
                priority: 0
                selector:
                  criteria:
                    - key: address
                      op: =
                      value: publicapi.payments.service.gov.uk
                  name: GovUkPay
              - action: allow
                applications:
                  - any
                name: MTA-Reform
                ports: tcp/25
                priority: 0
                selector:
                  criteria:
                    - key: address
                      op: =
                      value: mta.reform.hmcts.net
                  name: MTA-Reform
              - action: allow
                applications:
                  - HTTP
                  - SSL
                name: CNP-IDAM
                ports: tcp/443
                priority: 0
                selector:
                  criteria:
                    - key: address
                      op: =
                      value: idam-api.platform.hmcts.net
                  name: CNP-IDAM
            target:
              policymode: N/A
              selector:
                criteria:
                  - key: namespace
                    op: =
                    value: '*'
                name: AllPods
        customRules:
          - name: cp-idam
            egress:
              - action: allow
                applications:
                  - PostgreSQL
                  - SSL
                name: idam-postgres
                ports: tcp/5432
                priority: 0
                selector:
                  criteria: []
                  name: cp-idam-postgres
              - action: deny
                applications: []
                name: idam-deny-external
                ports: any
                priority: 0
                selector:
                  criteria: []
                  name: external
              - action: deny
                applications: []
                name: idam-deny-internal
                ports: any
                priority: 0
                selector:
                  criteria:
                    - key: namespace
                      op: =
                      value: '*'
                  name: IdamDenyInternal
            target:
              policymode: N/A  # NeuVector CRD controller rejects Protect/Monitor for groups with no active workloads; set mode via portal once crime-idam workloads are running
              selector:
                criteria: []
                name: cp-idam
