---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  releaseName: neuvector
  timeout: "900s"
  values:
    config:
      autoScan: true
    groups: []
    rules:
        admission:
          enable: true
          includeDefaultRules: true
          defaultRules: []
          rules: []
        network:
          includeDefaultRules: true
          defaultRules: []
          rules: []
        response:
          policies:
            - name: admission-control-denied
              event: admission-control
              conditions:
                - type: name
                  value: Admission.Control.Denied
              actions:
                - webhook
              disable: false
            - name: security-event-all
              event: security-event
              conditions: []
              actions:
                - webhook
              disable: true
            - name: security-event-error
              event: security-event
              conditions:
                - type: level
                  value: Error
              actions:
                - webhook
              disable: false
            - name: security-event-privilege-escalation
              event: security-event
              conditions:
                - type: name
                  value: Container.Privilege.Escalation
              actions:
                - quarantine
              disable: true
            - name: cve-report-high
              event: cve-report
              conditions:
                - type: cve-high
                  value: "10"
              actions:
                - quarantine
              disable: true
            - name: event-container-quarantined
              event: event
              conditions:
                - type: name
                  value: Container.Quarantined
              actions:
                - webhook
              disable: false
            - name: compliance-5-4
              event: compliance
              conditions:
                - type: name
                  value: "5.4"
              actions:
                - webhook
              disable: true
    neuvector:
      serviceAccount: neuvector
      containerd:
        enabled: true
      resources:
        requests:
          cpu: "100m"
          memory: "2Gi"
        limits:
          cpu: 1
          memory: 5Gi
      controller:
        replicas: 3
        azureFileShare:
          enabled: true
          secretName: nv-storage-secret
        ingress:
          path: "/"
          enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.tls: "true"
        apisvc:
          annotations:
            traefik.ingress.kubernetes.io/service.serversscheme: https
        configmap:
          enabled: true
          data:
            sysinitcfg.yaml: |
              New_Service_Policy_Mode: Discover
              Syslog_ip: fluentbit-log
              Syslog_IP_Proto: 6
              Syslog_Port: 5140
              Syslog_Level: Warning
              Syslog_status: true
              Syslog_in_json: true
              Scan_Config:
                Auto_Scan: true
              Syslog_Categories:
                - event
                - security-event
                - audit
              Cluster_Name: ${NV_CLUSTER_NAME}
      enforcer:
        priorityClassName: system-node-critical
      manager:
        env:
          ssl: false
        ingress:
          enabled: true
          httpredirect: false
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.tls: "false"
      cve:
        updater:
          # If false, cve updater will not be installed
          enabled: true
          schedule: "0 0 * * *"
  chart:
    spec:
      chart: neuvector-azure-keyvault
      version: 1.6.6
      sourceRef:
        kind: HelmRepository
        name: hmctsprod-oci
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: neuvector-controller-pod
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: longlived-token
                  secret:
                    secretName: neuvector-longlived-token
                    defaultMode: 420
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                  name: longlived-token
                  readOnly: true
              - op: add
                path: /spec/template/spec/initContainers/0/volumeMounts
                value:
                  - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                    name: longlived-token
                    readOnly: true
