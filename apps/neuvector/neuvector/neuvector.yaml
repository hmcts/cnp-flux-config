---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: neuvector
  namespace: neuvector
spec:
  releaseName: neuvector
  timeout: "900s"
  chart:
    spec:
      chart: neuvector-azure-keyvault
      version: 1.6.7
      sourceRef:
        kind: HelmRepository
        name: hmctsprod-oci
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: neuvector-controller-pod
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
              - op: add
                path: /spec/template/spec/volumes/-
                value:
                  name: longlived-token
                  secret:
                    secretName: neuvector-longlived-token
                    defaultMode: 420
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts/-
                value:
                  mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                  name: longlived-token
                  readOnly: true
              - op: add
                path: /spec/template/spec/initContainers/0/volumeMounts
                value:
                  - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                    name: longlived-token
                    readOnly: true
  values:
    config:
      autoScan: true
    neuvector:
      serviceAccount: neuvector
      containerd:
        enabled: false
      internal:
        autoGenerateCert: true  # controller spawns cert-upgrader job on fresh install to create neuvector-internal-certs
        autoRotateCert: false   # cert-upgrader CronJob has no schedule (suspended); keep false to prevent accidental rotation on schedule change
      resources:
        requests:
          cpu: "100m"
          memory: "2Gi"
        limits:
          cpu: 1
          memory: 5Gi
      controller:
        replicas: 3
        azureFileShare:
          enabled: true
          secretName: nv-storage-secret
        ingress:
          path: "/"
          enabled: true
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.tls: "true"
        apisvc:
          annotations:
            traefik.ingress.kubernetes.io/service.serversscheme: https
        configmap:
          enabled: true
          data:
            sysinitcfg.yaml: |
              New_Service_Policy_Mode: Discover
              Syslog_ip: fluentbit-log
              Syslog_IP_Proto: 6
              Syslog_Port: 5140
              Syslog_Level: Warning
              Syslog_status: true
              Syslog_in_json: true
              Scan_Config:
                Auto_Scan: true
              Syslog_Categories:
                - event
                - security-event
                - audit
              Cluster_Name: ${NV_CLUSTER_NAME}
      enforcer:
        priorityClassName: system-node-critical
      manager:
        env:
          ssl: false
        ingress:
          enabled: true
          httpredirect: false
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.tls: "false"
      cve:
        updater:
          # If false, cve updater will not be installed
          enabled: true
          schedule: "0 0 * * *"
    groups: []
    rules:
      admission:
        enable: true
        mode: "monitor" # one of: monitor, protect
        defaultRules:
          - action: allow
            comment: Allow admin namespaces
            criteria:
              - name: namespace
                op: containsAny
                value: knode-system,monitoring,flux-system,dynatrace,azureserviceoperator-system,cert-manager,keda,admin,kured,artifactory,pact-broker
          - action: allow
            comment: Allow HMCTS registries
            criteria:
              - name: imageRegistry
                op: containsAny
                value: https://hmctsprod.azurecr.io,https://hmctssbox.azurecr.io/,https://hmctspublic.azurecr.io/,https://hmctsprivate.azurecr.io/,https://sdshmctspublic.azurecr.io/
          - action: deny
            comment: Default deny
            criteria:
              - name: imageRegistry
                op: containsAny
                value: https://localhost/,https://*.*/
        customRules: []
      response:
        defaultPolicies:
          - name: admission-control-denied
            event: admission-control
            conditions:
              - type: name
                value: Admission.Control.Denied
            actions:
              - webhook
            disable: false
          - name: security-event-all
            event: security-event
            conditions: []
            actions:
              - webhook
            disable: true
          - name: security-event-error
            event: security-event
            conditions:
              - type: level
                value: Error
            actions:
              - webhook
            disable: false
          - name: security-event-privilege-escalation
            event: security-event
            conditions:
              - type: name
                value: Container.Privilege.Escalation
            actions:
              - quarantine
            disable: true
          - name: cve-report-high
            event: cve-report
            conditions:
              - type: cve-high
                value: "10"
            actions:
              - quarantine
            disable: true
          - name: event-container-quarantined
            event: event
            conditions:
              - type: name
                value: Container.Quarantined
            actions:
              - webhook
            disable: false
          - name: compliance-5-4
            event: compliance
            conditions:
              - type: name
                value: "5.4"
            actions:
              - webhook
            disable: true
        customPolicies: []
      network:
        defaultRules:
          - apiVersion: neuvector.com/v1
            kind: NvClusterSecurityRule
            metadata:
              name: allpods
              namespace: ""
            spec:
              egress:
                - action: allow
                  applications:
                    - DNS
                  name: DNS
                  ports: udp/53
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: domain
                        op: =
                        value: kube-system
                    name: nv.kube-dns.kube-system
                    original_name: ""
                - action: allow
                  applications:
                    - HTTP
                    - SSL
                  name: ApplicationInsights
                  ports: tcp/443
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: address
                        op: =
                        value: dc.services.visualstudio.com
                      - key: address
                        op: =
                        value: rt.services.visualstudio.com
                      - key: address
                        op: =
                        value: dc.applicationinsights.microsoft.com
                      - key: address
                        op: =
                        value: euw.rt.prod.applicationinsights.trafficmanager.net
                    name: ApplicationInsights
                    original_name: ""
                - action: allow
                  applications:
                    - HTTP
                    - PostgreSQL
                    - SSL
                  name: AzurePostgreSQL
                  ports: tcp/5432
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: address
                        op: =
                        value: '*.postgres.database.azure.com'
                    name: AzurePostgreSQL
                    original_name: ""
                - action: allow
                  applications:
                    - SSL
                  name: ServiceBus
                  ports: tcp/5671
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: address
                        op: =
                        value: '*.servicebus.windows.net'
                    name: ServiceBus
                    original_name: ""
                - action: allow
                  applications:
                    - HTTP
                    - SSL
                  name: GovUkNotify
                  ports: tcp/443
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: address
                        op: =
                        value: api.notifications.service.gov.uk
                    name: GovUkNotify
                    original_name: ""
                - action: allow
                  applications:
                    - HTTP
                    - SSL
                  name: GovUkPay
                  ports: tcp/443
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: address
                        op: =
                        value: publicapi.payments.service.gov.uk
                    name: GovUkPay
                    original_name: ""
                - action: allow
                  applications:
                    - any
                  name: MTA-Reform
                  ports: tcp/25
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: address
                        op: =
                        value: mta.reform.hmcts.net
                    name: MTA-Reform
                    original_name: ""
                - action: allow
                  applications:
                    - HTTP
                    - SSL
                  name: CNP-IDAM
                  ports: tcp/443
                  priority: 0
                  selector:
                    comment: ""
                    criteria:
                      - key: address
                        op: =
                        value: idam-api.platform.hmcts.net
                    name: CNP-IDAM
                    original_name: ""
              file: []
              ingress: []
              process: []
              target:
                policymode: N/A
                selector:
                  comment: ""
                  criteria:
                    - key: namespace
                      op: =
                      value: '*'
                  name: AllPods
                  original_name: ""
        customRules: []
