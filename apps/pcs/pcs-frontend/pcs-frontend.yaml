spec:
  releaseName: pcs-frontend
  values:
    nodejs:
      replicas: 2
      image: hmctsprod.azurecr.io/pcs/frontend:prod-c49610e-20260709081325 #{"$imagepolicy": "flux-system:pcs-frontend"}
