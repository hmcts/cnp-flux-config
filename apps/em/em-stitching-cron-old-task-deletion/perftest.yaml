apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-stitching-cron-old-task-deletion
spec:
  releaseName: em-stitching-cron-old-task-deletion
  values:
    job:
      applicationPort: 8095
      schedule: "*/15 17-19 * * *"
      environment:
        HISTORIC_DOCUMENT_TASKS_NO_OF_RETENTION_DAYS: 180
    global:
      environment: perftest
