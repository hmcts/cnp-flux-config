apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-stitching-cron-old-task-deletion
spec:
  releaseName: em-stitching-cron-old-task-deletion
  values:
    job:
      applicationPort: 8095
      environment:
        IDAM_WEB_API_BASE_URI: https://hmcts-access.service.gov.uk
        OPEN_ID_API_BASE_URI: https://hmcts-access.service.gov.uk/o
        APPLICATIONINSIGHTS_INSTRUMENTATION_LOGGING_LEVEL: INFO
        HISTORIC_DOCUMENT_TASKS_NO_OF_RETENTION_DAYS: 180
        HISTORIC_DOCUMENT_TASKS_NO_OF_RECORDS: 200
        HISTORIC_DOCUMENT_TASKS_CRONJOB_SCHEDULE: 0 0/15 3-5 * * *
    global:
      environment: prod
