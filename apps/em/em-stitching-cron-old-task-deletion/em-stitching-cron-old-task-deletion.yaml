apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-stitching-cron-old-task-deletion
spec:
  releaseName: em-stitching-cron-old-task-deletion
  values:
    java:
      enabled: false
    job:
      enabled: true
      disableActiveClusterCheck: false
      image: hmctsprod.azurecr.io/em/stitching:prod-156fde3-20260724082233 #{"$imagepolicy": "flux-system:em-stitching"}
      environment:
        TASK_NAME: RemoveOldDocumentTask
      schedule: "0 0 31 2 *" #schedule of "0 0 31 2 *" is a mechanism to not run the job at all (31st feb is a nonfiring date)
      global:
        jobKind: CronJob
        enableKeyVaults: true
  chart:
    spec:
      chart: ./stable/em-stitching
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
