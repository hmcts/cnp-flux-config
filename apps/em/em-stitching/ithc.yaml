apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-stitching
spec:
  values:
    java:
      memoryRequests: "3072Mi"
      environment:
        TEST_VAR: refresh
        IDAM_SECURITY_ALLOWED_ISSUERS_0: https://idam-web-public.ithc.platform.hmcts.net/o
        IDAM_SECURITY_ALLOWED_ISSUERS_1: https://hmcts-access.ithc.platform.hmcts.net/o
        IDAM_SECURITY_ALLOWED_ISSUERS_2: https://forgerock-am.service.core-compute-idam-ithc.internal:8443/openam/oauth2/realms/root/realms/hmcts
        HISTORIC_DOCUMENT_TASKS_CRONJOB_SCHEDULE: "0 0 0 31 2 *" # "0 0 0 31 2 *" is a mechanism to not run the job at all (31st Feb is nonfiring)
