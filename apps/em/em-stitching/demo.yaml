apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-stitching
spec:
  values:
    java:
      memoryRequests: "3072Mi"
      cpuRequests: "1500m"
      memoryLimits: "6144Mi"
      cpuLimits: "3000m"
      image: hmctsprod.azurecr.io/em/stitching:prod-146adc4-20260518141604 #{"$imagepolicy": "flux-system:demo-em-stitching"}
      environment:
        TEST_VAR: refresh2
        CALLBACK_MAX_ATTEMPTS: 5
        DOCUMENT_TASK_MILLISECONDS: 5000
        CALLBACK_HTTP_SCHEME: http
        CALLBACK_HTTP_HOST_PORT: 80
        CALLBACK_DOMAINS: em-ccd-orchestrator-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal,platform.hmcts.net
        CALLBACK_ENV: DEV
