apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-stitching
spec:
  values:
    java:
      memoryRequests: "3072Mi"
      cpuRequests: "1500m"
      memoryLimits: "6144Mi"
      cpuLimits: "3000m"
      environment:
        TEST_VAR: refresh
        IDAM_SECURITY_ALLOWED_ISSUERS_0: https://idam-web-public.aat.platform.hmcts.net/o
        IDAM_SECURITY_ALLOWED_ISSUERS_1: https://hmcts-access.aat.platform.hmcts.net/o
        IDAM_SECURITY_ALLOWED_ISSUERS_2: https://forgerock-am.service.core-compute-idam-aat2.internal:8443/openam/oauth2/realms/root/realms/hmcts
        HISTORIC_DOCUMENT_TASKS_NO_OF_RECORDS: 1000
        HISTORIC_DOCUMENT_TASKS_CRONJOB_SCHEDULE: "0 */30 * * * *"
        #DOCUMENT_TASK_MILLISECONDS: "3600000" # every hour
