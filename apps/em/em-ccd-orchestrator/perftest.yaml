apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-ccd-orchestrator
spec:
  values:
    java:
      memoryRequests: '1536Mi'
      autoscaling:
        enabled: true
        maxReplicas: 4
      environment:
        DUMMY: 1
        IDAM_SECURITY_ALLOWED_ISSUERS_0: https://idam-web-public.perftest.platform.hmcts.net/o
        IDAM_SECURITY_ALLOWED_ISSUERS_1: https://hmcts-access.perftest.platform.hmcts.net/o
        IDAM_SECURITY_ALLOWED_ISSUERS_2: https://forgerock-am.service.core-compute-idam-perftest.internal:8443/openam/oauth2/realms/root/realms/hmcts
