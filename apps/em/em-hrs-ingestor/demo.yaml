apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-hrs-ingestor
spec:
  values:
    job:
      schedule: "*/10 * * * *"
      image: hmctsprod.azurecr.io/em/hrs-ingestor:prod-096b5e2-20260720100442 #{"$imagepolicy": "flux-system:demo-em-hrs-ingestor"}
      environment:
        USE_AD_AUTH_FOR_SOURCE_BLOB_CONNECTION: true
        CVP_STORAGE_CONTAINER_NAME: recordings
        MAX_FILES_TO_PROCESS: 500
      # Run every 30 minutes as demo is a single cluster
