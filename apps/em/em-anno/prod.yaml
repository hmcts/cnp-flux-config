apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: em-anno
spec:
  values:
    java:
      environment:
        IDAM_API_BASE_URI: "https://idam-api.platform.hmcts.net"
        OPEN_ID_API_BASE_URI: "https://hmcts-access.service.gov.uk/o"
        FLAG: "refresh2"
        APPLICATIONINSIGHTS_INSTRUMENTATION_LOGGING_LEVEL: INFO
        S2S_NAMES_WHITELIST: xui_webapp
        IDAM_SECURITY_ALLOWED_ISSUERS_0: https://hmcts-access.service.gov.uk/o
        IDAM_SECURITY_ALLOWED_ISSUERS_1: https://forgerock-am.service.core-compute-idam-prod2.internal:8443/openam/oauth2/realms/root/realms/hmcts
      spotInstances:
        enabled: false