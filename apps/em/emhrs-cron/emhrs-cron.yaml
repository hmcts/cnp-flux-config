apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emhrs-cron
spec:
  releaseName: emhrs-cron
  values:
    java:
      enabled: false
    job:
      enabled: true
      disableActiveClusterCheck: false
      image: hmctsprod.azurecr.io/em/hrs-api:prod-231b7a8-20260724094206 #{"$imagepolicy": "flux-system:em-hrs-api"}
      environment:
        TASK_NAME: DummyValue
        INGESTION_ENABLED: false
        CCDUPLOAD_ENABLED: false
      schedule: "0 0 31 2 *" #schedule of "0 0 31 2 *" is a mechanism to not run the job at all (31st feb is a nonfiring date)
      global:
        jobKind: CronJob
        enableKeyVaults: true
  chart:
    spec:
      chart: ./stable/em-hrs-api
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
