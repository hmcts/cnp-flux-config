apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - gotk-components.yaml
  - ../../workload-identity
  - aso-controller-settings-patch.yaml
  - ../../docker-regcreds/sbox
  - ../../../base/flux-alerts/kustomization.yaml
  - ../../../base/slack-provider/sbox/slack-token.enc.yaml
patches:
  - path: ../../serviceaccount/sbox.yaml
  - path: ../../serviceaccount/sbox-source-controller.yaml
  - path: ../../base/patches/workload-identity-deployment-patch.yaml
  - path: ../../base/patches/workload-identity-source-controller-patch.yaml
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --concurrent=10
    target:
      kind: Deployment
      name: helm-controller
      namespace: flux-system
