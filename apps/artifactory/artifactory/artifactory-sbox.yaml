apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: artifactory-oss
  namespace: artifactory
spec:
  chart:
    spec:
      chart: artifactory-oss
      version: 107.133.12
  values:
    artifactory:
      artifactory:
        systemYaml: |
          shared:
            database:
              allowNonPostgresql: true
          jfconnect:
            enabled: false