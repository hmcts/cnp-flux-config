apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: adoption-web
spec:
  releaseName: adoption-web
  interval: 1m
  values:
    nodejs:
      readinessPeriod: 15
      image: hmctsprod.azurecr.io/adoption/web:pr-1752-6464928-20260305122149 #{"$imagepolicy": "flux-system:ithc-adoption-web"}
      environment:
        PCQ_ENABLED: "true"
        APPINSIGHTS_KEY: '811b0b32-53bb-4c50-ae35-279b5cd91c40'
        SECURE_COOKIE: 'true'
        REDIS_PORT: 6380
        RATE_LIMIT_ENABLED: true
        RATE_LIMIT_WINDOW_SECONDS: 60
        RATE_LIMIT_MAX_REQUESTS: 6
        EXPRESS_NUMBER_TRUST_PROXIES: 3
