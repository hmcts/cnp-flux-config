apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cmc-citizen-frontend
  namespace: money-claims
spec:
  values:
    nodejs:
      ingressHost: moneyclaims.aat.platform.hmcts.net
      environment:
        DUMMY_RESTART_VAR: true
        FEATURE_TESTING_SUPPORT: true
        FEATURE_RETURN_ERROR_TO_USER: true
        FEATURE_WEB_CHAT: true
        FEATURE_MOCK_PAY: true
        FEATURE_AAT_TEST: false
        PCQ_URL: https://pcq.aat.platform.hmcts.net
        SESSION_USE_REDIS_STORE: "true"
        SESSION_REDIS_HOST: civil-citizen-ui-draft-store-aat.redis.cache.windows.net
        SESSION_REDIS_PORT: "6380"
        SESSION_REDIS_TLS: "true"
        SESSION_REDIS_KEY_PREFIX: "citizen-ui-session:"
