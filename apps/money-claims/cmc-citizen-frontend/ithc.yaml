apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cmc-citizen-frontend
  namespace: money-claims
spec:
  values:
    nodejs:
      ingressHost: moneyclaims.ithc.platform.hmcts.net
      environment:
        DUMMY_RESTART_VAR: true
        IDAM_API_URL: https://idam-api.ithc.platform.hmcts.net
        IDAM_AUTHENTICATION_WEB_URL: https://idam-web-public.ithc.platform.hmcts.net
        FEATURE_TESTING_SUPPORT: true
        SESSION_USE_REDIS_STORE: "true"
        SESSION_REDIS_HOST: civil-citizen-ui-draft-store-ithc.redis.cache.windows.net
        SESSION_REDIS_PORT: "6380"
        SESSION_REDIS_TLS: "true"
        SESSION_REDIS_KEY_PREFIX: "citizen-ui-session:"
