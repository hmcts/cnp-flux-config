apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: et-reconfiguration-cron
spec:
  releaseName: et-reconfiguration-cron
  values:
    job:
      environment:
        CRON_CASE_TYPE_ID: ET_EnglandWales
      suspend: false
      schedule: "0 14 * * *"
    global:
      jobKind: CronJob
      enableKeyVaults: true
      environment: aat
