apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: et-cos
spec:
  releaseName: et-cos
  values:
    java:
      environment:
        DB_QUEUE_ENABLED: true
        CREATE_UPDATES_POLL_INTERVAL: 60000
        UPDATE_CASE_POLL_INTERVAL: 60000
        ET_CCD_DATA_MIGRATION_ENABLED: true
        ET_CCD_DATA_MIGRATION_CRON: "0 0 10 * * *" # run at 10am BST
        ET_CCD_DATA_MIGRATION_TASK_NAME: et-ccd-data-migration
        ET_CCD_DATA_MIGRATION_MODE: PRELOAD_EVENTS
        ET_CCD_DATA_MIGRATION_CASE_TYPE_IDS: ET_EnglandWales,ET_Scotland,ET_Admin,ET_EnglandWales_Multiple,ET_Scotland_Multiple,ET_EnglandWales_Listings,ET_Scotland_Listings
        ET_CCD_DATA_MIGRATION_EVENT_BATCH_SIZE: "10000"
        ET_CCD_DATA_MIGRATION_MAX_BATCHES_PER_RUN: "1000000"
        ET_CCD_DATA_MIGRATION_MAX_RUN_TIME: 8h # finish at 6pm
        ET_CCD_DATA_MIGRATION_CASE_REVISION_OFFSET: "1000000000"
