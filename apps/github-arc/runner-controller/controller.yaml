apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-controller
  namespace: github-arc
  annotations:
    # ARC charts use a strict values schema and do not understand the shared
    # java/nodejs/job/global default values that the cluster base patch injects.
    hmcts.github.com/kustomize-defaults: disabled
spec:
  releaseName: arc-controller
  interval: 5m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: gha-runner-scale-set-controller
      version: 0.14.2
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: github-arc
  values:
    replicaCount: 1
