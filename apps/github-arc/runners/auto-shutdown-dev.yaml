apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: auto-shutdown-dev
  namespace: github-arc
  annotations:
    # ARC charts use a strict values schema and do not understand the shared
    # java/nodejs/job/global default values that the cluster base patch injects.
    hmcts.github.com/kustomize-defaults: disabled
spec:
  releaseName: auto-shutdown-dev
  interval: 5m
  # The runner scale set CRDs (AutoscalingRunnerSet) are owned by the controller,
  # so the controller release must reconcile first.
  dependsOn:
    - name: arc-controller
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: gha-runner-scale-set
      version: 0.14.2
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
        namespace: github-arc
  values:
    # Repository these runners serve. Workflows target them with `runs-on: auto-shutdown-dev`
    # (the runnerScaleSetName below), NOT `runs-on: self-hosted`.
    githubConfigUrl: "https://github.com/hmcts/auto-shutdown-dev"
    # Pre-created Kubernetes secret holding the GitHub App credentials
    # (github_app_id, github_app_installation_id, github_app_private_key).
    # Created manually in the github-arc namespace - not stored in git.
    githubConfigSecret: github-arc-app
    runnerScaleSetName: auto-shutdown-dev
    # Scale to zero when idle; burst up to 2 concurrent runners.
    minRunners: 0
    maxRunners: 2
    # dind = Docker-in-Docker sidecar. Required because:
    #   - release.yml runs steps inside `container: hmctspublic.azurecr.io/sups-runner`
    #   - runner-image.yml performs `docker build` / buildx of the runner image
    # NOTE: dind runs a privileged sidecar - the namespace must permit privileged pods.
    containerMode:
      type: dind
