apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wa-task-management-api
spec:
  values:
    java:
      memoryLimits: "2048Mi"
      memoryRequests: "1280Mi"
      cpuLimits: "2000m"
      cpuRequests: "1000m"
      image: hmctsprod.azurecr.io/wa/task-management-api:prod-b312f05-20260722111155 #{"$imagepolicy": "flux-system:ithc-wa-task-management-api"}
      environment:
        REFRESH_FLAG: "3"
        ALLOWED_JURISDICTIONS: wa,ia,sscs,civil,publiclaw,privatelaw,st_cic
        ALLOWED_CASE_TYPES: asylum,wacasetype,sscs,civil,generalapplication,care_supervision_epo,prlapps,privatelaw_exceptionrecord,benefit,criminalinjuriescompensation,bail
