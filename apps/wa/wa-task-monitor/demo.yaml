apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wa-task-monitor
spec:
  values:
    java:
      image: hmctsprod.azurecr.io/wa/task-monitor:pr-661-614222b-20260529134633 #{"$imagepolicy": "flux-system:demo-wa-task-monitor"}
      environment:
        LOGGING_LEVEL_UK_GOV_HMCTS: DEBUG
        RECONFIGURATION_RETRY_WINDOW_TIME_HOURS: 4
        POSTGRES_HOST: cft-task-postgres-db-flexible-{{ .Values.global.environment }}.postgres.database.azure.com
        POSTGRES_PORT: 5432
        POSTGRES_DB: cft_task_db
        REFRESH_FLAG: "1"
