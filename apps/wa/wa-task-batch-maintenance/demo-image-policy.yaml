apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: demo-wa-task-batch-maintenance
  annotations:
    hmcts.github.com/prod-automated: enabled
spec:
  imageRepositoryRef:
    name: wa-task-batch-maintenance
  filterTags:
    pattern: '^pr-905-[a-f0-9]+-(?P<ts>[0-9]+)'
    extract: '$ts'
  policy:
    alphabetical:
      order: asc
