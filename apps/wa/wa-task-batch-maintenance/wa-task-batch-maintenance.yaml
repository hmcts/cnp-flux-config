apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wa-task-batch-maintenance
spec:
  releaseName: wa-task-batch-maintenance
  values:
    job:
      useInterpodAntiAffinity: true
      image: hmctsprod.azurecr.io/wa/task-batch-service:prod-af2d22b-20260611002952 #{"$imagepolicy": "flux-system:wa-task-batch-maintenance"}
      environment:
        JOB_NAME: DATABASE_MAINTENANCE
  chart:
    spec:
      chart: ./stable/wa-task-batch-service
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
