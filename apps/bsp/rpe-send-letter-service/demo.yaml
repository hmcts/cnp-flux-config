apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rpe-send-letter-service
spec:
  values:
    java:
      # pr-2764 contains send letter service changes for FACT-2740
      image: hmctsprod.azurecr.io/rpe/send-letter-service:pr-2764
      imagePullPolicy: Always
      environment:
        DELETE_OLD_LETTERS_CRON: 0 */20 1-23 * * 0-6
        BATCH_SIZE: 3500
        ENCRYPTION_ENABLED: false
        CIVIL_SERVICE_ENABLED: true
