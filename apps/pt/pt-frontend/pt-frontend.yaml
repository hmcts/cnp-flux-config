apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pt-frontend
spec:
  releaseName: pt-frontend
  values:
    nodejs:
      replicas: 2
      image: hmctsprod.azurecr.io/pt/frontend:prod-65ad28d-20260721110034 #{"$imagepolicy": "flux-system:pt-frontend"}
      environment:
        VAR_TA: 1
  chart:
    spec:
      chart: ./stable/pt-frontend
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
