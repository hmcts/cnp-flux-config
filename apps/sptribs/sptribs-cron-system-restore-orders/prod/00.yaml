apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sptribs-cron-system-restore-orders
spec:
  releaseName: sptribs-cron-system-restore-orders
  values:
    job:
      schedule: "0 10 * * *"
      environment:
        RESTORE_ORDERS_TASK_ENABLED: true
        IDAM_API_BASEURL: https://idam-api.platform.hmcts.net
    global:
      jobKind: CronJob
      enableKeyVaults: true
      tenantId: "531ff96d-0ae9-462a-8d2d-bec7c0b42082"
      environment: prod