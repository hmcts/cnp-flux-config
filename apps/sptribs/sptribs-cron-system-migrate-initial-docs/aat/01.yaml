apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sptribs-cron-system-migrate-initial-docs
spec:
  releaseName: sptribs-cron-system-migrate-initial-docs
  values:
    job:
      schedule: "30 11 * * *"
      environment:
        INITIAL_DOCUMENTS_MIGRATION_ENABLED: true
        INITIAL_DOCUMENTS_MIGRATION_TEST_CASE_REF:
        INITIAL_DOCUMENTS_MIGRATION_SKIP_MIGRATED: true
        INITIAL_DOCUMENTS_MIGRATION_BATCH_SIZE: 2
    global:
      jobKind: CronJob
      enableKeyVaults: true
      tenantId: "531ff96d-0ae9-462a-8d2d-bec7c0b42082"
      environment: aat