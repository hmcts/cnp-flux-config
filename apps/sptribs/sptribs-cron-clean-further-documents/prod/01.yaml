apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sptribs-cron-clean-further-documents
spec:
  releaseName: sptribs-cron-clean-further-documents
  values:
    job:
      schedule: "0 11 * * *"
      environment:
        CLEAN_DELETED_DOCUMENTS_ENABLED: true
    global:
      jobKind: CronJob
      enableKeyVaults: true
      tenantId: "531ff96d-0ae9-462a-8d2d-bec7c0b42082"
      environment: prod