apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sptribs-dss-update-case-web
  namespace: sptribs
spec:
  values:
    nodejs:
      image: hmctsprod.azurecr.io/sptribs/dss-update-case-web:pr-1178-8682b04-20260717131017
      ingressSessionAffinity:
        enabled: true
        sessionCookieName: sticky
      environment:
        IDAM_API_URL: https://idam-web-public.perftest.platform.hmcts.net/o/token
        IDAM_WEB_URL: https://idam-web-public.perftest.platform.hmcts.net/o/authorize
        IDAM_END_SESSION_URL: 'https://idam-web-public.perftest.platform.hmcts.net/o/endSession'
        DUMMY_ENV_VAR: false
    global:
      environment: perftest
      enableKeyVaults: true
  chart:
    spec:
      chart: ./stable/sptribs-dss-update-case-web
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
