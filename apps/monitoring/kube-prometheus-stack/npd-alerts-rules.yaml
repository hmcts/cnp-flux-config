apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
  name: prometheus-node-problem-detector-rules
  namespace: monitoring
spec:
  "groups":
  - "name": "node-problem-detector"
    "rules":
    # Node condition set by kubelet/AKS and exposed by kube-state-metrics (always present,
    # independent of whether Node Problem Detector is the self-hosted DaemonSet or the AKS
    # managed exporter). This is the most reliable signal for loss of node network access.
    - "alert": "NPDNetworkUnavailable"
      "annotations":
        "message": "Node {{ $labels.node }} reports condition NetworkUnavailable=true."
      "expr": |
        max by (node) (kube_node_status_condition{condition="NetworkUnavailable",status="true"}) == 1
      "for": "5m"
      "labels":
        "severity": "critical"
    # Permanent node conditions from the Node Problem Detector exporter (problem_gauge == 1
    # while the problem is active), populated by the AKS managed NPD scrape config
    # (kube-prometheus-stack.yaml, job aks-node-problem-detector), enabled on all environments.
    # Grouped by "instance" only, since the AKS managed node-role scrape has no "pod" label.
    - "alert": "NPDNodeLocalDnsResolutionFailure"
      "annotations":
        "message": "Node Problem Detector reports local DNS resolution is failing on {{ $labels.instance }}."
      "expr": |
        max by (instance) (problem_gauge{type="NodeLocalDnsResolutionFailure"}) == 1
      "for": "10m"
      "labels":
        "severity": "critical"
    - "alert": "NPDReadonlyFilesystem"
      "annotations":
        "message": "Node Problem Detector reports a read-only filesystem on {{ $labels.instance }}."
      "expr": |
        max by (instance) (problem_gauge{type="ReadonlyFilesystem"}) == 1
      "for": "5m"
      "labels":
        "severity": "critical"
    - "alert": "NPDKernelDeadlock"
      "annotations":
        "message": "Node Problem Detector reports a kernel deadlock on {{ $labels.instance }}."
      "expr": |
        max by (instance) (problem_gauge{type="KernelDeadlock"}) == 1
      "for": "5m"
      "labels":
        "severity": "critical"
    - "alert": "NPDCorruptDockerOverlay2"
      "annotations":
        "message": "Node Problem Detector reports corrupt Docker overlay2 storage on {{ $labels.instance }}."
      "expr": |
        max by (instance) (problem_gauge{type="CorruptDockerOverlay2"}) == 1
      "for": "5m"
      "labels":
        "severity": "critical"
    # Temporary node events (problem_counter increments as events occur).
    - "alert": "NPDFrequentUnregisterNetDevice"
      "annotations":
        "message": "Node Problem Detector reports {{ $value }} UnregisterNetDevice kernel events in 15m on {{ $labels.instance }}."
      "expr": |
        sum by (instance) (increase(problem_counter{reason="UnregisterNetDevice"}[15m])) > 3
      "for": "5m"
      "labels":
        "severity": "warning"
    - "alert": "NPDFrequentOOMKilling"
      "annotations":
        "message": "Node Problem Detector reports {{ $value }} OOMKilling kernel events in 15m on {{ $labels.instance }}."
      "expr": |
        sum by (instance) (increase(problem_counter{reason="OOMKilling"}[15m])) > 5
      "for": "5m"
      "labels":
        "severity": "warning"
    - "alert": "NPDKernelOops"
      "annotations":
        "message": "Node Problem Detector reports {{ $value }} KernelOops kernel events in 15m on {{ $labels.instance }}."
      "expr": |
        sum by (instance) (increase(problem_counter{reason="KernelOops"}[15m])) > 0
      "for": "5m"
      "labels":
        "severity": "warning"
