    nodejs:
      ingressHost: immigration-appeal.perftest.platform.hmcts.net
      image: hmctsprod.azurecr.io/ia/aip-frontend:prod-db0469a-20260624140116 #{"$imagepolicy": "flux-system:perftest-ia-aip-frontend"}
      environment:
        NODE_ENV: development
        IDAM_WEB_URL: "https://idam-web-public.perftest.platform.hmcts.net"
