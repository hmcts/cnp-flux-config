apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ia-timed-event-service
spec:
  values:
    java:
      image: hmctsprod.azurecr.io/ia/timed-event-service:pr-229-260629d-20260319114050 #{"$imagepolicy": "flux-system:demo-ia-timed-event-service"}
      keyVaults:
        ia:
          resourceGroup: ia
          secrets:
            - name: idam-client-id
              alias: IA_IDAM_CLIENT_ID
            - name: idam-secret
              alias: IA_IDAM_SECRET
            - name: idam-redirect-uri
              alias: IA_IDAM_REDIRECT_URI
            - name: system-username
              alias: IA_SYSTEM_USERNAME
            - name: system-password
              alias: IA_SYSTEM_PASSWORD
            - name: s2s-secret
              alias: IA_S2S_SECRET
            - name: s2s-microservice
              alias: IA_S2S_MICROSERVICE
            - name: timed-event-service-POSTGRES-PASS-15
              alias: spring.datasource.password
            - name: AppInsightsInstrumentationKey
              alias: azure.application-insights.instrumentation-key
            - name: app-insights-connection-string
              alias: app-insights-connection-string
            - name: ia-config-validator-secret
              alias: IA_CONFIG_VALIDATOR_SECRET
            - name: postgres-auth-values-tes-password
              alias: PG_AUTH_VALUES_YAML_PASS
            - name: ia-redis-connection-string
              alias: IA_REDIS_CONNECTION_STRING
            - name: ia-redis-access-key
              alias: IA_REDIS_ACCESS_KEY
      environment:
        POSTGRES_HOST: ia-timed-event-service-postgres-db-v15-demo.postgres.database.azure.com
        POSTGRES_USERNAME: pgadmin
        RESTART_PODS: "Y"
