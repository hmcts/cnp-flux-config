apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ia-case-api
spec:
  values:
    java:
      image: hmctsprod.azurecr.io/ia/case-api:pr-3072-e776a44-20260327164403 #{"$imagepolicy": "flux-system:demo-ia-case-api"}
      environment:
        IA_HOME_OFFICE_INTEGRATION_ENABLED: "true"
        IA_TIMED_EVENT_SERVICE_ENABLED: "true"
        COMMON_DATA_API: http://rd-commondata-api-demo.service.core-compute-demo.internal
        IA_HEARINGS_API_URL: http://ia-hearings-api-demo.service.core-compute-demo.internal/
        POSTGRES_HOST: ia-case-api-postgres-db-v15-demo.postgres.database.azure.com
        POSTGRES_USERNAME: pgadmin
        LOCATION_REF_DATA_URL: http://rd-location-ref-api-demo.service.core-compute-demo.internal
        FEES_REGISTER_API_URL: "http://fees-register-api-demo.service.core-compute-demo.internal"
        RESTART_ME: "Yes"
        #PAYMENT_AFTER_REMISSION_REJECTION_DUE_IN_MINUTES: 30
        #PAYMENT_EA_HU_NO_REMISSION_DUE_IN_MINUTES: 30
        #PAYMENT_REMINDER_DUE_IN_MINUTES: 30
        #LEGAL_REP_REMISSION_REMINDER_DUE_IN_MINUTES: 10
        SAVE_NOTIFICATIONS_TO_DATA_EVENT_ENABLED: true
        SAVE_NOTIFICATIONS_DATA_SCHEDULE_HOUR: 18
        SAVE_NOTIFICATIONS_DATA_SCHEDULE_MAX_MINUTES: 5
      keyVaults:
        ia:
          resourceGroup: ia
          secrets:
            - name: ia-gov-notify-key
              alias: IA_GOV_NOTIFY_KEY
            - name: ia-bail-gov-notify-key
              alias: IA_BAIL_GOV_NOTIFY_KEY
            - name: docmosis-enabled
              alias: IA_DOCMOSIS_ENABLED
            - name: em-stitching-enabled
              alias: IA_EM_STITCHING_ENABLED
            - name: submit-hearing-requirements-enabled
              alias: IA_SUBMIT_HEARING_REQUIREMENTS_ENABLED
            - name: system-username
              alias: IA_SYSTEM_USERNAME
            - name: system-password
              alias: IA_SYSTEM_PASSWORD
            - name: idam-client-id
              alias: IA_IDAM_CLIENT_ID
            - name: idam-secret
              alias: IA_IDAM_SECRET
            - name: s2s-secret
              alias: idam.s2s-auth.totp_secret
            - name: s2s-microservice
              alias: IA_S2S_MICROSERVICE
            - name: prof-ref-data-url
              alias: PROF_REF_DATA_URL
            - name: launch-darkly-sdk-key
              alias: LAUNCH_DARKLY_SDK_KEY
            - name: case-api-POSTGRES-PASS-15
              alias: spring.datasource.password
            - name: app-insights-connection-string
              alias: app-insights-connection-string
            - name: postgres-auth-values-password
              alias: PG_AUTH_VALUES_YAML_PASS
            - name: docmosis-access-key
              alias: DOCMOSIS_ACCESS_KEY
            - name: ia-config-validator-secret
              alias: IA_CONFIG_VALIDATOR_SECRET
            - name: AppInsightsInstrumentationKey
              alias: azure.application-insights.instrumentation-key
            - name: ia-system-access-username
              alias: IA_SYSTEM_ACCESS_USERNAME
            - name: ia-system-access-password
              alias: IA_SYSTEM_ACCESS_PASSWORD
            - name: ia-redis-connection-string
              alias: IA_REDIS_CONNECTION_STRING
            - name: ia-redis-access-key
              alias: IA_REDIS_ACCESS_KEY
            - name: ia-redis-encryption-key
              alias: IA_REDIS_ENCRYPTION_KEY
