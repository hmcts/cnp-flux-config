apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: aat-ia-case-api
  annotations:
    hmcts.github.com/prod-automated: enabled
spec:
  imageRepositoryRef:
    name: ia-case-api
  filterTags:
    pattern: '^prod-679f732-(?P<ts>[0-9]+)'
    extract: '$ts'
  policy:
    alphabetical:
      order: asc
