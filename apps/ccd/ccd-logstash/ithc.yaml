apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ccd-logstash
  namespace: ccd
spec:
  releaseName: ccd-logstash
  values:
    replicas: 1
    extraEnvs:
      - name: ES_HOST0
        value: http://ccd-data-0.service.core-compute-ithc.internal:9200
      - name: ES_HOST1
        value: http://ccd-data-1.service.core-compute-ithc.internal:9200
      - name: ES_HOST2
        value: http://ccd-data-2.service.core-compute-ithc.internal:9200
      - name: ES_HOST3
        value: http://ccd-data-3.service.core-compute-ithc.internal:9200
    logstashConfig:
      logstash.yml: |
        api.http.host: 0.0.0.0
        xpack.monitoring.enabled: false
        xpack.monitoring.elasticsearch.hosts: ["${ES_HOST0}", "${ES_HOST1}", "${ES_HOST2}", "${ES_HOST3}"]
        queue.type: persisted
        dead_letter_queue.enable: true
        pipeline.ecs_compatibility: disabled
    logstashPipeline:
      03_output.conf: |
        output {
            elasticsearch {
                hosts => ["${ES_HOST0}", "${ES_HOST1}", "${ES_HOST2}", "${ES_HOST3}"]
                sniffing => false
                index => "%{[index_id]}"
                document_type => "_doc"
                document_id => "%{id}"
                timeout => 60
            }
        }
      dead_letter_indexing_pipeline.conf: |
        input {
          dead_letter_queue {
            path => "${LOGSTASH_HOME}/data/dead_letter_queue"
            commit_offsets => true
            pipeline_id => "main"
          }
        }

        filter {
          # capture the entire event, and write it to a new field; we'll call that field `failed_case`
          ruby {
            code => "event.set('failed_case', event.to_json())"
          }

          # prune every field off the event except for the one we've just created. Note that this does not prune event metadata.
          prune {
            whitelist_names => [ "^failed_case$" ]
          }

          ruby {
            code => "event.set('timestamp', event.get('[@metadata][dead_letter_queue][entry_time]'))"
          }

          # pull useful information out of the event metadata provided by the dead letter queue, and add it to the new event.
          mutate {
            add_field => {
              "reason" => "%{[@metadata][dead_letter_queue][reason]}"
            }
          }
        }

        output {
          elasticsearch {
            hosts => ["${ES_HOST0}", "${ES_HOST1}", "${ES_HOST2}", "${ES_HOST3}"]
            sniffing => false
            index => "ccd-logstash-dead-letter"
          }
        }
