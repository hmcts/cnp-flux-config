apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ccd-definition-store-api
spec:
  releaseName: ccd-definition-store-api
  values:
    java:
      replicas: 2
      useInterpodAntiAffinity: true
      image: hmctsprod.azurecr.io/ccd/definition-store-api:prod-0b49d67-20260610095638 #{"$imagepolicy": "flux-system:ccd-definition-store-api"}
      environment:
        DEFINITION_STORE_TX_TIMEOUT_DEFAULT: 120
        ENABLE_CASE_GROUP_ACCESS: false
  chart:
    spec:
      chart: ./stable/ccd-definition-store-api
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
