apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fact-cron-trigger-audit-cleanup
spec:
  releaseName: fact-cron-trigger-audit-cleanup
  values:
    job:
      useInterpodAntiAffinity: true
      image: hmctsprod.azurecr.io/fact/cron-trigger:prod-b58f24e-20260721085117 #{"$imagepolicy": "flux-system:fact-cron-trigger-audit-cleanup"}
      schedule: "0 9 * * *"
      environment:
        FACT_JOB_TYPE: AUDIT_CLEANUP
        FACT_DATA_API_URL: http://fact-data-api-${ENVIRONMENT}.service.core-compute-${ENVIRONMENT}.internal
  chart:
    spec:
      chart: ./stable/fact-cron-trigger
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 5m


