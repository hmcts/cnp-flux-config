apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fact-cron-trigger
spec:
  releaseName: fact-cron-trigger
  values:
    job:
      useInterpodAntiAffinity: true
      image: hmctsprod.azurecr.io/fact/cron-trigger:prod-b58f24e-20260721085117 #{"$imagepolicy": "flux-system:fact-cron-trigger"}
      schedule: "*/40 * * * *"
      environment:
        FACT_JOB_TYPE: CSV
        FACT_API_URL: http://fact-api-${ENVIRONMENT}.service.core-compute-${ENVIRONMENT}.internal
  chart:
    spec:
      chart: ./stable/fact-cron-trigger
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 5m
