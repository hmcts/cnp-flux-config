apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ccpay-callback-function
spec:
  values:
    function:
      aadIdentityName: ccpay
      environment:
        S2S_URL: http://rpe-service-auth-provider-aat.service.core-compute-aat.internal
        MICROSERVICE_PAYMENT_APP: "payment_app"
        SERVICE_LOGGING_ENABLED: false
        DUMMY_RESTART_VAR: true
        SERVICE_CALLBACK_URL_PATTERN: "^(?:https?://([a-z0-9-]+-(aat|prod|demo|ithc|perftest).service.core-compute-\\2.internal|(www.)?(apply-divorce|end-civil-partnership).service.gov.uk)(?:/.)?|http://pr-\\d+.preview.platform.hmcts.net(?:/.)?)$"
      keyVaults:
        "ccpay":
          secrets:
            - payment-s2s-secret
