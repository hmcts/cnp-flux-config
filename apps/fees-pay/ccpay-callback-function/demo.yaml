apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ccpay-callback-function
spec:
  values:
    function:
      image: hmctsprod.azurecr.io/ccpay/callback-function:prod-9d20f45-20260428082526 #{"$imagepolicy": "flux-system:demo-ccpay-callback-function"}
      aadIdentityName: ccpay
      failedJobsHistoryLimit: 5
      successfulJobsHistoryLimit: 5
      rollout:
        strategy: gradual
        propagationPolicy: foreground
      podAnnotations: {}
      environment:
        S2S_URL: http://rpe-service-auth-provider-demo.service.core-compute-demo.internal
        MICROSERVICE_PAYMENT_APP: "payment_app"
        SERVICE_LOGGING_ENABLED: false
        SERVICE_CALLBACK_URL_PATTERN: "^https?://(?:[a-z0-9-]+-(aat|prod|demo|ithc|perftest)\\.service\\.core-compute-\\1\\.internal|(?:www\\.)?(?:apply-divorce|end-civil-partnership)\\.service\\.gov\\.uk|[a-z0-9-]+\\.preview\\.platform\\.hmcts\\.net)(?:/.*)?$"
        DUMMY_RESTART_VAR: true
      keyVaults:
        "ccpay":
          secrets:
            - payment-s2s-secret
      triggers:
        - type: azure-servicebus
          topicName: "ccpay-service-callback-topic"
          subscriptionName: serviceCallbackPremiumSubscription
          connectionFromEnv: SERVICE_CALLBACK_BUS_CONNECTION
          queueLength: "1"
          messageCount: "1"
