apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ccpay-bubble-frontend
spec:
  releaseName: ccpay-bubble-frontend
  values:
    nodejs:
      replicas: 2
      autoscaling:
        enabled: true
        maxReplicas: 4
        memory:
          enabled: true
          averageUtilization: 120
      memoryRequests: '512Mi'
      memoryLimits: '1024Mi'
      cpuRequests: '150m'
      cpuLimits: '500m'
      ingressHost: paybubble.aat.platform.hmcts.net
      image: hmctsprod.azurecr.io/ccpay/bubble-frontend:prod-bc3332c-20260529115303 #{"$imagepolicy": "flux-system:ccpay-bubble-frontend"}
      environment:
        DUMMY_RESTART_VAR: false
        TELEPHONY_FEATURE: enabled
        DYNATRACE_SCRIPT_URL: https://js-cdn.dynatrace.com/jstag/17177a07246/bf24054dsx/e81e772d50fb5321_complete.js
