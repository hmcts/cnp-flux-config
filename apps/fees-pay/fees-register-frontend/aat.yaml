apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fees-register-frontend
spec:
  releaseName: fees-register-frontend
  values:
    nodejs:
      replicas: 2
      autoscaling:
        enabled: true
        maxReplicas: 4
        memory:
          enabled: true
          averageUtilization: 120
      memoryRequests: '512Mi'
      memoryLimits: '1024Mi'
      cpuRequests: '70m'
      cpuLimits: '250m'
    environment:
      DUMMY_RESTART_VAR: false
      IDAM_LOGIN_WEB_URL: https://idam-web-public.{{ .Values.global.environment }}.platform.hmcts.net/o/authorize
