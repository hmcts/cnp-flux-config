apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backstage
  namespace: backstage
spec:
  values:
    ingress:
      host: backstage-sandbox.hmcts.net
    backend:
      image: hmctsprod.azurecr.io/backstage-portal/backend:pr-69-5bdb1d6e-1780063769
      db:
        user: pgadmin
        host: hmcts-backstage-ptlsbox.postgres.database.azure.com
        ssl: require
      cors:
        origin: https://backstage-sandbox.hmcts.net
    techdocs:
      storageUrl: https://backstage-api.sandbox.platform.hmcts.net/api/techdocs/static/docs
      requestUrl: http://backstage-api.sandbox.platform.hmcts.net/api/techdocs
