apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prl-cron-hearing-bundle-task
spec:
  releaseName: prl-cron-hearing-bundle-task
  values:
    job:
      environment:
        APP_ENV: "perftest"
      schedule: 30 08 * * *
    global:
      jobKind: CronJob
      enableKeyVaults: true
      tenantId: "531ff96d-0ae9-462a-8d2d-bec7c0b42082"
      environment: perftest
