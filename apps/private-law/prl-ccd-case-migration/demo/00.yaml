apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prl-ccd-case-migration
spec:
  releaseName: prl-ccd-case-migration
  values:
    job:
      image: hmctspublic.azurecr.io/prl/ccd-case-migration:pr-253-5b2c6bc-20260612134053 #{"$imagepolicy": "flux-system:demo-prl-ccd-case-migration"}
      schedule: "30 14 12 06 *"
      environment:
        IDAM_REDIRECT_URL: https://prl-cos-demo.service.core-compute-demo.internal/oauth2/callback
        IDAM_S2S_URL: http://rpe-service-auth-provider-demo.service.core-compute-demo.internal
        IDAM_API_URL: https://idam-api.demo.platform.hmcts.net
        CCD_DATA_STORE_API_BASE_URL: http://ccd-data-store-api-demo.service.core-compute-demo.internal
        CCD_CASE_DOCS_AM_API: http://ccd-case-document-am-api-demo.service.core-compute-demo.internal
        MIGRATION_ENABLED: true
        MIGRATION_CASE_IDS: "1781101538105924,1781102050520755"
        MIGRATION_QUERY_SIZE: 100
        MIGRATION_CASE_LIMIT: 6000
        MIGRATION_QUERY_BACTHING_SIZE: 100
        MIGRATION_CASES_PROCESSING_LIMIT: 1000
        MIGRATION_QUERY_TYPE: ALL
        MIGRATION_STEP_CLASSES: "DeadlinkCleanupMigrationStep"
        CASE_MIGRATION_TIMEOUT: 7200
        MIGRATION_STEP_ROLLBACK: false
      keyVaults:
        prl:
          secrets:
            - name: app-insights-connection-string
              alias: app-insights-connection-string
            - name: prl-cos-idam-client-secret
              alias: IDAM_CLIENT_SECRET
            - name: system-update-user-username
              alias: SYSTEM_UPDATE_USER_USERNAME
            - name: system-update-user-password
              alias: PRL_SYSTEM_UPDATE_PASSWORD
            - name: microservicekey-prl-cos-api
              alias: IDAM_S2S_AUTH_TOTP_SECRET
