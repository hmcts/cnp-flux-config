apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prl-ccd-case-migration
spec:
  releaseName: prl-ccd-case-migration
  values:
    job:
      schedule: "30 13 24 06 *"
      image: hmctsprod.azurecr.io/prl/ccd-case-migration:prod-d5d735c-20260623091906 #{"$imagepolicy": "flux-system:prl-ccd-case-migration"}
      keyVaults:
        prl:
          secrets:
            - name: app-insights-connection-string
              alias: app-insights-connection-string
            - name: prl-cos-idam-client-secret
              alias: IDAM_CLIENT_SECRET
            - name: system-update-user-username
              alias: SYSTEM_UPDATE_USER_USERNAME
            - name: system-update-user-password
              alias: PRL_SYSTEM_UPDATE_PASSWORD
            - name: microservicekey-prl-cos-api
              alias: IDAM_S2S_AUTH_TOTP_SECRET
            - name: migration-data
              alias: MIGRATION_DATA
      environment:
        IDAM_API_URL: https://idam-api.platform.hmcts.net
        ACA_SERVICE_API_BASEURL: http://aac-manage-case-assignment-prod.service.core-compute-prod.internal
        CCD_DATA_STORE_API_BASE_URL: http://ccd-data-store-api-prod.service.core-compute-prod.internal
        CCD_CASE_DOCS_AM_API: http://ccd-case-document-am-api-prod.service.core-compute-prod.internal
        MIGRATION_ENABLED: true
        MIGRATION_CASE_IDS: "1763726155671352,1763390410347595,1761819533792636,1770092972673217,1753028651690453"
        MIGRATION_QUERY_TYPE: ALL
        MIGRATION_IN_STATE_STATE_TO_INCLUDE: "NOT_APPLICABLE"
        MIGRATION_STEP_CLASSES: "DeadlinkCleanupMigrationStep"
        DEADLINK_MIGRATION_ENABLED: false
        MIGRATION_QUERY_BACTHING_SIZE: 100
        MIGRATION_CASES_PROCESSING_LIMIT: 100000
        MIGRATION_QUERY_SIZE: 100
        MIGRATION_CASE_LIMIT: 5
        MIGRATION_STEP_ROLLBACK: false
        RETRY_FAILURES: true
        CASE_MIGRATION_TIMEOUT: 7200
        DEFAULT_THREAD_LIMIT: 20
        DEFAULT_THREAD_DELAY: 0
        DEFAULT_QUERY_SIZE: 100
        BATCH_SEARCH_AFTER:
