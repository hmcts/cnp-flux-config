apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: kustomization-dependency-not-ready
  namespace: flux-system
spec:
  providerRef:
    name: slack
  summary: ${CLUSTER_FULL_NAME}-aks
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      namespace: flux-system
      name: '*'
  inclusionList:
    - ".*Dependencies do not meet ready condition.*"