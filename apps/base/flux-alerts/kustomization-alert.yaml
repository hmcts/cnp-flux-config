apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: kustomization-failures
  namespace: flux-system
spec:
  providerRef:
    name: slack-kustomization-alerts
  summary: ${CLUSTER_FULL_NAME}-aks
  eventSeverity: error
  eventSources:
    - kind: Kustomization
      namespace: flux-system
      name: '*'
