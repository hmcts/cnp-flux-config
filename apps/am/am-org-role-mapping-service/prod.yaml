apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: am-org-role-mapping-service
spec:
  values:
    java:
      environment:
        AM_INFO: false
        APPLICATION_LOGGING_LEVEL: INFO
        OPEN_ID_API_BASE_URI: https://hmcts-access.service.gov.uk/o
        IDAM_USER_URL: https://idam-api.platform.hmcts.net
        # PRD Config
        PROFESSIONAL_REFRESH_API_ENABLED: false
        PROFESSIONAL_SCHEDULING_ENABLED: false
        # Refresh Job Config
        # REFRESH_JOB: LEGAL_OPERATIONS-IA-NEW-0-186
        # Other
        DUMMY_VAL: false
