apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: am-org-role-mapping-service
spec:
  values:
    java:
      environment:
        AM_INFO: true
        APPLICATION_LOGGING_LEVEL: INFO
        SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT: 10000
        TESTING_SUPPORT_ENABLED: true
        # DB_FEATURE_FLAG_ENABLE: possessions_wa_1_0
        # DB_FEATURE_FLAG_DISABLE: hrs_1_0
        REFRESH_JUDICIAL_FILTER_SOFT_DELETED_USERS: true
        # PRD Config
        PROFESSIONAL_REFRESH_API_ENABLED: false
        PROFESSIONAL_SCHEDULING_ENABLED: false
        # Refresh Job Config
        # REFRESH_JOB: LEGAL_OPERATIONS-PCS-NEW-0-2019
        # always set 'REFRESH_JOB_ALLOW_UPDATE' to false before next refresh (i.e. only use when setting existing job to ABORTED)
        # REFRESH_JOB_ALLOW_UPDATE: false
        # Other
        DUMMY_VAR: true
