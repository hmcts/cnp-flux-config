apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plum-frontend
spec:
  chart:
    spec:
      chart: ./stable/plum-frontend
      interval: 1m
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
  values:
    nodejs:
      ingressHost: plum.sandbox.platform.hmcts.net
      replicas: 2
      autoscaling:
        minReplicas: 1
      image: hmctssbox.azurecr.io/plum/frontend:prod-a1b7c71-20260706110800 # {"$imagepolicy": "flux-system:plum-frontend-sbox"}
      keyVaults:
        plumsi:
          secrets:
            - name: "azure-managed-redis-connection-string"
              alias: "redis-connection-string" # Maps to /mnt/secrets/redis-connection-string
            - name: appInsights-InstrumentationKey
