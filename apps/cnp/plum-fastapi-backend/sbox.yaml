apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plum-fastapi-backend
spec:
  values:
    global:
      enableKeyVaults: true
    python:
      ingressHost: plum-fastapi-backend-sandbox.service.core-compute-sandbox.internal
      image: hmctssbox.azurecr.io/plum/fastapi-backend:latest # {"$imagepolicy": "flux-system:plum-fastapi-backend-sbox"}
      keyVaults:
        plumsi:
          secrets:
            - name: appinsights-connection-string
      environment:
        RECIPES_SERVICE_URL: http://plum-recipe-backend-java
        APPLICATIONINSIGHTS_CONNECTION_STRING_FILE: /mnt/secrets/plumsi/appinsights-connection-string
