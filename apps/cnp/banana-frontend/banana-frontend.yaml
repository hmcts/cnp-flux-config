apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: banana-frontend
spec:
  releaseName: banana-frontend
  chart:
    spec:
      chart: ./stable/recipes-frontend
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
  values:
    nodejs:
      image: hmctsprod.azurecr.io/recipes/frontend:prod-04ff19a-20250124230523 # {"$imagepolicy": "flux-system:banana-frontend"}
      useWorkloadIdentity: true
      workloadClientID: ${WORKLOAD_IDENTITY_ID}
      environment:
        RECIPE_BACKEND_URL: http://banana-backend-java
