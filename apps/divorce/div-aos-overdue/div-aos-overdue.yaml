apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: div-aos-overdue
spec:
  releaseName: div-aos-overdue
  values:
    job:
      schedule: "0 * * * *"
      useInterpodAntiAffinity: true
      image: hmctsprod.azurecr.io/div/cos:prod-bc84d9b-20260511090120 #{"$imagepolicy": "flux-system:div-cos"}
      environment:
        TASK_NAME: AosOverdueTask
  chart:
    spec:
      chart: div-cron
      version: 0.0.3
      sourceRef:
        kind: HelmRepository
        name: hmctsprod-oci
        namespace: flux-system
