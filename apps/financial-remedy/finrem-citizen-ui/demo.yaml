apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: finrem-citizen-ui
  namespace: financial-remedy
spec:
  releaseName: finrem-citizen-ui
  values:
    nodejs:
      image: hmctsprod.azurecr.io/finrem/citizen-ui:prod-acf6792-20260521092302 #{"$imagepolicy": "flux-system:demo-finrem-citizen-ui"}
      ingressHost: finrem-citizen-ui.demo.platform.hmcts.net
      environment:
        RESTART_PODS: "Yes"
        DUMMY_VAR: 1
        DOCUMENT_MANAGEMENT_STORE_URL: http://dm-store-demo.service.core-compute-demo.internal
        CASE_DOCUMENT_AM_URL: http://ccd-case-document-am-api-demo.service.core-compute-demo.internal
        IDAM_WEB_URL: https://idam-web-public.demo.platform.hmcts.net/login
        IDAM_END_SESSION_URL: https://idam-web-public.demo.platform.hmcts.net/o/endSession
        IDAM_API_URL: https://idam-api.demo.platform.hmcts.net/o/token
        OAUTH_CALLBACK_URL: https://finrem-citizen-ui.demo.platform.hmcts.net/oauth2/callback
        CCD_URL: http://ccd-data-store-api-demo.service.core-compute-demo.internal
    global:
      environment: demo
      enableKeyVaults: true
      DUMMY_VAR: 1
