apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: finrem-citizen-ui
  namespace: financial-remedy
spec:
  releaseName: finrem-citizen-ui
  values:
    nodejs:
      environment:
        RESTART_PODS: "Yes"
        DUMMY_VAR: 1
        DOCUMENT_MANAGEMENT_STORE_URL: http://dm-store-aat.service.core-compute-aat.internal
        CASE_DOCUMENT_AM_URL: http://ccd-case-document-am-api-aat.service.core-compute-aat.internal
        IDAM_WEB_URL: https://hmcts-access.aat.platform.hmcts.net/login
        IDAM_END_SESSION_URL: https://hmcts-access.aat.platform.hmcts.net/o/endSession
        IDAM_API_URL: https://idam-api.aat.platform.hmcts.net/o/token
        OAUTH_CALLBACK_URL: https://finrem-citizen-ui.aat.platform.hmcts.net/oauth2/callback
        CCD_URL: https://ccd-data-store-api-finrem-ccd-definitions-pr-3089.preview.platform.hmcts.net
    global:
      environment: aat
      enableKeyVaults: true
      DUMMY_VAR: 1
