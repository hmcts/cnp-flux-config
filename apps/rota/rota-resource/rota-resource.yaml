apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rota-resource
spec:
  releaseName: rota-resource
  values:
    java:
      image: hmctsprod.azurecr.io/rota/resource:latest # {"$imagepolicy": "flux-system:rota-resource"}
      applicationPort: 4550
      ingressHost: rota-resource.{{ .Values.global.environment }}.platform.hmcts.net
      aadIdentityName: rota
  chart:
    spec:
      chart: ./stable/rota-resource
      sourceRef:
        kind: GitRepository
        name: hmcts-charts
        namespace: flux-system
      interval: 1m
