apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: demo-cron-ccd-data-migration-tool
spec:
  filterTags:
    pattern: '^pr-293-[a-f0-9]+-(?P<ts>[0-9]+)'
    extract: '$ts'
  policy:
    alphabetical:
      order: asc
  imageRepositoryRef:
    name: probate-cron-ccd-data-migration-tool
