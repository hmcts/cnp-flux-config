apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: probate-cron-ccd-data-migration-tool
spec:
  releaseName: probate-cron-ccd-data-migration-tool
  values:
    job:
      image: hmctsprod.azurecr.io/probate/cron-ccd-data-migration-tool:prod-346ca1f-20260723143641
      schedule: "45 15 24 7 *"
      cpuRequests: "1000m"
      cpuLimits: "2500m"
      memoryRequests: "1024Mi"
      memoryLimits: "2048Mi"
      environment:
        TRIG: trig-2
        DEFAULT_THREAD_LIMIT: 25
        MIGRATION_USE_REIMPL: true
        MIGRATION_DRYRUN: true
        USER_TOKEN_REFRESH_MARGIN_MINS: 5
        S2S_TOKEN_REFRESH_MARGIN_MINS: 5
        MIGRATION_ID: DTSPB-5539
#        CASE_REFERENCES:
        DTSPB_5539_CASE_TYPES: WillLodgement,StandingSearch
        DTSPB_5539_HMCTS_ID: ABA6
        DTSPB_5539_INITIAL_RUN: true
        DTSPB_5539_INITIAL_SIZE: 10
