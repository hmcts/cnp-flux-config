apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: probate-cron-ccd-data-migration-tool
spec:
  releaseName: probate-cron-ccd-data-migration-tool
  values:
    job:
      schedule: "25 20 2 6 *"
      cpuRequests: "1000m"
      cpuLimits: "2500m"
      memoryRequests: "1024Mi"
      memoryLimits: "2048Mi"
      environment:
        TRIG: trig-2
        IDAM_API_URL: https://idam-api.platform.hmcts.net
        PRD_API_URL: http://rd-professional-api-prod.service.core-compute-prod.internal
        MIGRATION_USE_REIMPL: true
        MIGRATION_ID: "DTSPB-5005"
        USER_TOKEN_REFRESH_MARGIN_MINS: 5
        S2S_TOKEN_REFRESH_MARGIN_MINS: 5
        DTSPB_5005_ROLLBACK_DATE: "2026-05-27"
        MIGRATION_DRYRUN: true
