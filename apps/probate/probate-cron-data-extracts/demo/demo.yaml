apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: probate-cron-data-extracts
spec:
  releaseName: probate-cron-data-extracts
  values:
    job:
      image: hmctsprod.azurecr.io/probate/back-office:pr-3847-78b2cf1-20260609094703 #{"$imagepolicy": "flux-system:demo-probate-back-office"}
      schedule: "30 16 25 3 *"
      environment:
        TASK_NAME: DataExtractTask
        MANAGE_CASE_URL: https://manage-case.demo.platform.hmcts.net
        FRONTEND_URL: https://probate.demo.platform.hmcts.net
    global:
      jobKind: CronJob
      enableKeyVaults: true
      tenantId: "531ff96d-0ae9-462a-8d2d-bec7c0b42082"
      environment: demo
    chart:
      spec:
        chart: probate-cron
        version: 0.0.31
        sourceRef:
          kind: HelmRepository
          name: hmctsprod-oci
          namespace: flux-system
