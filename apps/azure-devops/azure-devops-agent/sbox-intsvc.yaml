apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: azure-devops-agent
  namespace: azure-devops
spec:
  values:
    environment:
      AZP_POOL: hmcts-sandbox-agent-pool
    memoryRequests: 1024Mi
    cpuRequests: 250m
    memoryLimits: 6144Mi
    cpuLimits: 2000m
    maxReplicaCount: 5
    triggerAuth:
      enabled: true
      create: true
      triggerPodIdentityProvider: "azure-workload"
      triggerPodIdentityIdentityId: "0816daac-1bdf-4af8-a8d9-35147c91ec97" # keda-cftsbox-intsvc-mi
    triggers:
      - type: "azure-pipelines"
        poolID: "14"
        organizationURLFromEnv: "AZP_URL"
        personalAccessTokenFromEnv: "AZP_TOKEN"
    job:
      activeDeadlineSeconds: 32400 # 9hr timeout for long-running jobs
  chart:
    spec:
      chart: function
      version: 2.5.3
      sourceRef:
        kind: HelmRepository
        name: hmctspublic
        namespace: flux-system
