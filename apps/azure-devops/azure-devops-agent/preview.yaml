apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: azure-devops-agent
  namespace: azure-devops
spec:
  values:
    maxReplicaCount: 13
    triggerAuth:
      enabled: true
      create: true
      triggerPodIdentityProvider: "azure-workload"
      triggerPodIdentityIdentityId: "d7a2a92e-63ba-4ee3-b8fb-9680afee622f" # keda-aat-mi
    triggers:
      - type: azure-pipelines
        poolID: "26"
        organizationURLFromEnv: "AZP_URL"
        personalAccessTokenFromEnv: "AZP_TOKEN"
  chart:
    spec:
      chart: function
      version: 2.5.2
      sourceRef:
        kind: HelmRepository
        name: hmctspublic
        namespace: flux-system
